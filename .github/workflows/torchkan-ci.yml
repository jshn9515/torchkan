name: Test and Build TorchKAN Package

on:
  push:
    branches: [main]
    paths:
      - "torchkan/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/torchkan-ci.yml"
  pull_request:
    paths:
      - "torchkan/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/torchkan-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: torchkan-ci-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            package-suffix: py312
          - python-version: "3.13"
            package-suffix: py313
          - python-version: "3.14"
            package-suffix: py314

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Format check with ruff
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: format --check --diff
          src: >-
            torchkan
            tests

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install .

      - name: Test torchkan package on Python ${{ matrix.python-version }}
        run: uv run python -m pytest ./tests

      - name: Build torchkan package for Python ${{ matrix.python-version }}
        run: uv build --python ${{ matrix.python-version }} --out-dir dist/${{ matrix.package-suffix }} --clear .

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: torchkan-package-${{ matrix.package-suffix }}
          path: dist/${{ matrix.package-suffix }}/*
          if-no-files-found: error
